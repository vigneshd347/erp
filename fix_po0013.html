<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fix PO Item Categories</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; background: #f8fafc; }
  h2 { color: #1e3a5f; }
  table { border-collapse: collapse; width: 100%; margin-top: 16px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  th { background: #1e3a5f; color: white; padding: 10px 14px; text-align: left; font-size: 0.85rem; }
  td { padding: 10px 14px; border-bottom: 1px solid #e5e7eb; font-size: 0.85rem; }
  tr:last-child td { border-bottom: none; }
  button { padding: 6px 14px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.82rem; font-weight: 600; }
  button:hover { background: #1d4ed8; }
  .success { color: #16a34a; font-weight: 700; font-size: 1.1rem; margin-top: 12px; }
  .warn { color: #b45309; font-weight: 600; }
  .empty { color: #ef4444; font-weight: 700; font-size: 1.1rem; }
  input[type=text] { padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.9rem; width: 120px; }
</style>
</head>
<body>
<h2>📋 ERP — Fix PO Item Categories</h2>

<div id="output"></div>

<script>
const output = document.getElementById('output');
const records = JSON.parse(localStorage.getItem('manti_order_records') || '[]');
const pos = records.filter(r => r.type === 'Purchase Order');

if (pos.length === 0) {
    output.innerHTML = '<p class="empty">❌ No Purchase Order records found in localStorage.<br><br>Please open this page from the <strong>same browser</strong> you use for the ERP (not a different browser or profile).</p>';
} else {
    let html = `<p>Found <strong>${pos.length}</strong> Purchase Orders. Select the items to fix:</p>`;
    html += `<table>
        <thead><tr>
            <th>PO #</th><th>Vendor</th><th>Category</th><th>Items</th><th>Fix</th>
        </tr></thead><tbody>`;

    pos.forEach((po, poIdx) => {
        const items = po.items || [];
        const itemSummary = items.map((it, i) =>
            `<div>[${i+1}] <b>${it.desc || '—'}</b> → <span style="color:${it.category==='Assets'?'#dc2626':it.category==='Consumables'?'#16a34a':'#374151'}">${it.category || '—'}</span></div>`
        ).join('') || `<div>${po.product || '—'}</div>`;

        html += `<tr>
            <td><b>${po.id}</b></td>
            <td>${po.vendor || '—'}</td>
            <td>${po.category || '—'}</td>
            <td>${itemSummary}</td>
            <td>
                <div style="display:flex;flex-direction:column;gap:6px;">
                    <div>Items (1-based, comma separated):<br>
                    <input type="text" id="items_${poIdx}" placeholder="e.g. 1,2" value="1,2">
                    </div>
                    <div>Change to:
                    <select id="cat_${poIdx}" style="padding:4px 8px;border:1px solid #d1d5db;border-radius:4px;">
                        <option value="Consumables">Consumables</option>
                        <option value="Assets">Assets</option>
                        <option value="Stock">Stock</option>
                        <option value="Others">Others</option>
                        <option value="Design">Design</option>
                    </select>
                    </div>
                    <button onclick="fixPO(${poIdx})">Fix</button>
                    <span id="msg_${poIdx}"></span>
                </div>
            </td>
        </tr>`;
    });

    html += `</tbody></table>`;
    output.innerHTML = html;
}

function fixPO(poIdx) {
    const records = JSON.parse(localStorage.getItem('manti_order_records') || '[]');
    const pos = records.filter(r => r.type === 'Purchase Order');
    const po = pos[poIdx];
    if (!po) { document.getElementById('msg_'+poIdx).textContent = '❌ Not found'; return; }

    const itemsInput = document.getElementById('items_'+poIdx).value;
    const newCat = document.getElementById('cat_'+poIdx).value;
    const indices = itemsInput.split(',').map(s => parseInt(s.trim()) - 1).filter(i => !isNaN(i));

    if (!po.items) { document.getElementById('msg_'+poIdx).textContent = '❌ No items array'; return; }

    let changed = 0;
    indices.forEach(i => {
        if (po.items[i]) {
            po.items[i].category = newCat;
            po.items[i].assetType = newCat === 'Assets' ? (po.items[i].assetType || 'Other') : '';
            changed++;
        }
    });

    // Update top-level category to match first item
    if (po.items[0]) po.category = po.items[0].category;
    po.assetType = po.category === 'Assets' ? (po.assetType || 'Other') : '';

    localStorage.setItem('manti_order_records', JSON.stringify(records));
    document.getElementById('msg_'+poIdx).innerHTML = `<span class="success">✓ Fixed ${changed} item(s)!</span>`;
    setTimeout(() => location.reload(), 1200);
}
</script>
</body>
</html>
